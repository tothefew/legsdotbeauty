<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Legs.Beauty</title>
<meta name="referrer" content="no-referrer">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    line-height:1.5;
    padding:1rem;
    min-height:100vh;
    background:#2a2a2a;
    background-image:var(--bg);
    background-size:cover;
    background-attachment:fixed;
    color:#f8f9fa;
    text-shadow:0 1px 3px #0008;
}
.nav{max-width:880px;margin:0 auto}
.header{margin-bottom:2rem}
.header h1{font-size:1.8rem;font-weight:700}
.header p{font-size:.9rem;margin-top:.3rem;opacity:.85}
.nav-buttons{display:flex;flex-direction:column;align-items:center;gap:1.5rem;margin:2rem 0}
.nav-btn{
    background:none;border:none;font-size:1.4rem;font-weight:700;cursor:pointer;
    padding:.25rem .5rem;display:inline-block;
    text-decoration:underline wavy #ffd966;text-underline-offset:8px;
    transition:.2s;color:inherit;text-shadow:inherit;
}
.nav-btn:active{background:linear-gradient(120deg,#ffd96633,#ffd9661a);transform:scale(.98)}
.nav-btn:hover{opacity:.85;transform:translateY(-2px)}
.footer{margin-top:2.5rem;padding-top:1rem;font-size:.75rem;border-top:1px solid #fff3;text-align:center;opacity:.7}
.footer-note{margin-top:.75rem;font-size:.7rem}
.category-main-title{font-size:1.8rem;font-weight:700;margin-bottom:.75rem}
.category-subtitle{font-size:.9rem;background:#8884;backdrop-filter:blur(4px);padding:.6rem 1rem;border-radius:12px;margin-bottom:2rem;border:1px solid #fff2}
.site{margin-bottom:1.8rem}
.site-name{font-weight:600;font-size:1.1rem}
.sep{opacity:.6;margin:0 .25rem}
.site-url{color:#ffd966;text-decoration:none;border-bottom:1px solid #ffd9666b;word-break:break-all}
.site-url:hover{border-bottom-color:#ffd966}
.site-desc{font-size:.85rem;opacity:.75;margin-top:.3rem}
.back-home{display:inline-block;margin-top:2rem;color:#ffd966;text-decoration:none;font-size:.85rem;border-bottom:1px solid transparent}
.back-home:hover{border-bottom-color:#ffd966}
.hidden{display:none}
@media (max-width:640px){body{padding:.75rem}.nav-btn{font-size:1.2rem}.category-main-title{font-size:1.6rem}.site-name{display:block;margin-bottom:.1rem}.sep{display:none}}
</style>
</head>
<body>
<div class="nav">
    <div id=home>
        <div class=header><h1 id=siteTitle></h1><p id=siteDesc></p></div>
        <div class=nav-buttons id=btns></div>
        <div class=footer id=footer></div>
    </div>
    <div id=content></div>
</div>
<script>
// ========== 所有可修改内容 ==========
const C = {
    // 首页主标题、副标题
    siteTitle: "Legs.Beauty",
    siteDesc: "大概是个书签，放一些自己常用的网站，所有链接均不含AFF。",
    // 背景图URL（留空则灰色）
    bg: "https://files.seeusercontent.com/2026/04/04/bj1J/20260403_232855.jpg",
    // 按钮下方附加文字（留空不显示）
    subText: "",
    // 页脚邮箱、日期、额外文字
    email: "long@legs.beauty",
    date: "2026/06/13",
    footerNote: "",
    // 分类配置（主标题、副标题）
    cats: {
        domain_related: { title: "域名相关", desc: "域名注册、续费、转移价格查询及实用工具。" },
        chinese_podcast_finder: { title: "中文播客发现", desc: "听说听播客可能对情绪有调节作用！" },
        blogroll: { title: "博客聚合", desc: "给博客聚合网站来个聚合嘿嘿嘿～希望能发现更多的优质博客！" }
    },
    // 导航按钮（id需与cats键名一致）
    btns: [
        { name: "域名相关", id: "domain_related" },
        { name: "播客发现", id: "chinese_podcast_finder" },
        { name: "博客聚合", id: "blogroll" }
    ],
    // 书签数据
    marks: {
        domain_related: [
            { name: "大佬论坛", url: "https://www.dalao.net/", desc: "全球域名论坛、域名交易与投资交流社区" },
            { name: "哪煮米", url: "https://www.nazhumi.com/", desc: "去哪儿煮米？域名注册续费转移价格查询平台。" },
            { name: "米情局", url: "https://miqingju.com/", desc: "域名比价平台" },
            { name: "NameBeta", url: "https://namebeta.com/zh", desc: "域名注册比价&可用性检测。" },
            { name: "tld-list", url: "https://tld-list.com/", desc: "提供价格监控等功能，部分收费。" },
            { name: "TLDHub", url: "https://tldhub.com/", desc: "Cheapest Domain Registration Prices" },
            { name: "Archive.org", url: "https://archive.org/", desc: "域名历史网页留档查询" },
            { name: "ExpiredDomains.net", url: "https://member.expireddomains.net/", desc: "过期域名提醒" }
        ],
        chinese_podcast_finder: [
            { name: "播播鸡", url: "https://boboji.org/", desc: "中文播客榜" },
            { name: "中文播客榜", url: "https://xyzrank.com/", desc: "枫言枫语fyfy.fm出品，发现中文播客。" }
        ],
        blogroll: [
            { name: "个站商店", url: "https://storeweb.cn/", desc: "一个精致的，带社交元素的个人网站发布平台，博客收录网站" },
            { name: "博友圈", url: "https://www.boyouquan.com/home", desc: "博友圈是专属博客人的朋友圈！有同类网站收录页面" },
            { name: "博客录", url: "https://boke.lu/", desc: "收录博客。有同类网站收录页面" },
            { name: "博客志", url: "http://www.jetli.com.cn/", desc: "坚持快二十年的博客收录站点了，纯手工维护，收录了很多优质博客（有同名公众号，不过这两年更新好像滞缓了许多）" },
            { name: "十年之约", url: "https://www.foreverblog.cn/", desc: "一个人的寂寞，一群人的狂欢。申请加入者需要遵守博客十年不关闭的诺言" },
            { name: "BlogFinder", url: "https://bf.zzxworld.com/", desc: "发现优秀的博客" },
            { name: "开往", url: "https://www.travellings.cn/", desc: "友链接力。让传统友链“活跃”，让网页相互接力，让流量相互流动，让网络开放起来" },
            { name: "博客我们", url: "https://blogwe.com/", desc: "致敬还在写博客的我们。（已停止收录新网站，旧数据已归档。首页有同类网站推荐）" },
            { name: "博客集", url: "https://bloginc.cn/", desc: "" },
            { name: "BlogsClub-博客俱乐部", url: "https://www.blogsclub.org/", desc: "" },
            { name: "朋.友", url: "https:///peng.you", desc: "朋友们的博客展示站" },
            { name: "笔墨迹", url: "https://blogscn.fun/", desc: "" },
            { name: "中文独立博客列表", url: "https://github.com/timqian/chinese-independent-blogs", desc: "" },
            { name: "集博栈（ 原中文博客列表导航）", url: "https://www.zhblogs.net/", desc: "尝试收集并链接所有的个人博客站点" },
            { name: "博客之家（偏收录站）", url: "https://www.perass.com/", desc: "" },
            { name: "博客之家（偏论坛）", url: "https://52blog.cn/", desc: "一个围绕长期兴趣、真实经验与克制交流建立的社区" },
            { name: "博客说", url: "https://blogtalk.org/home", desc: "" },
            { name: "博客星球", url: "https://www.blogplanet.cn/", desc: "" },
            { name: "博客圈子", url: "https://bkqz.cn/", desc: "" },
            { name: "若梦博客", url: "https://www.rmbk.cc/", desc: "" },
            { name: "好站网", url: "https://haozhan.wang/", desc: "" },
            { name: "BlogBlog.Club - 部落部落俱樂部", url: "https://blogblog.club/", desc: "一個專門推坑大家寫部落格的地方。实际上不是博客聚合类网站，但因为与博客相关，所以一并收录进来" },
            { name: "壹個博客", url: "https://oneblog.net/", desc: "" },
            { name: "博客中心", url: "https://bokehub.com/home", desc: "" },
            { name: "浪海导航", url: "https://www.langhai.net/", desc: "" },
            { name: "劳动者独立技术综合博客志", url: "https://laodongzhe.cn/", desc: "" }
        ]
    }
};
// =================================
if(C.bg) document.body.style.setProperty('--bg',`url("${C.bg}")`);
document.getElementById('siteTitle').innerText = C.siteTitle;
document.getElementById('siteDesc').innerText = C.siteDesc;

const home = document.getElementById('home'), content = document.getElementById('content');
const btnsDiv = document.getElementById('btns'), footerDiv = document.getElementById('footer');
const esc = s => s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : '';

const renderFooter = () => {
    let html = `${esc(C.email)} · 最后更新于 ${esc(C.date)}`;
    if(C.footerNote?.trim()) html += `<div class=footer-note>${esc(C.footerNote)}</div>`;
    footerDiv.innerHTML = html;
};

const renderBtns = () => {
    btnsDiv.innerHTML = '';
    C.btns.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerHTML = `${esc(b.name)} »`;
        btn.onclick = () => { location.hash = `#/${b.id}`; route(); };
        btnsDiv.appendChild(btn);
    });
};

const renderCat = id => {
    const cat = C.cats[id], list = C.marks[id];
    if(!cat || !list) {
        content.innerHTML = `<div style="padding:2rem;text-align:center">分类不存在，<a href="#" id=backHome style="color:#ffd966">返回首页</a></div>`;
        document.getElementById('backHome')?.addEventListener('click', e => { e.preventDefault(); location.hash = '#/'; route(); });
        return;
    }
    let html = `<div class=category-main-title>${esc(cat.title)}</div>`;
if(cat.desc) html += `<div class=category-subtitle>${esc(cat.desc)}</div>`;
    list.forEach(s => {
    const short = s.url.replace(/^https?:\/\//,'');
    html += `<div class=site><span class=site-name>${esc(s.name)}</span><span class=sep>·</span><a class=site-url href="${esc(s.url)}" target=_blank rel="noopener noreferrer nofollow">${esc(short)} ↗</a>`;
    if(s.desc && s.desc.trim()) {
        html += `<div class=site-desc>${esc(s.desc)}</div>`;
    }
    html += `</div>`;
});
    html += `<a href="#" id=backHomeLink class=back-home>← 返回首页</a>`;
    content.innerHTML = html;
    document.getElementById('backHomeLink')?.addEventListener('click', e => { e.preventDefault(); location.hash = '#/'; route(); });
};

const showHome = () => {
    home.classList.remove('hidden');
    content.innerHTML = C.subText ? `<div style="margin:1rem 0 0;font-size:.9rem;text-align:center">${esc(C.subText)}</div>` : '';
    renderBtns();
    renderFooter();
};
const hideHome = () => home.classList.add('hidden');

const route = () => {
    let hash = location.hash.slice(1);
    if(!hash || hash === '/') return showHome();
    let id = hash.startsWith('/') ? hash.slice(1) : hash;
    if(C.cats[id] && C.marks[id]) { hideHome(); renderCat(id); }
    else { location.hash = '#/'; route(); }
};

window.addEventListener('hashchange', route);
route();
</script>
</body>
    </html>
